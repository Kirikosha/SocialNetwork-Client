<div class="profile-container">
  @if (memberModel) {
    <div class="profile-header">
      <!-- Cover Photo (optional) -->
      <div class="cover-photo"></div>
      
      <!-- Profile Info Section -->
      <div class="profile-info-section">
        <div class="profile-pic-wrapper">
          @if (memberModel.profileImage && memberModel.profileImage.imageUrl) {
            <img [src]="memberModel.profileImage.imageUrl" 
                 alt="Profile Picture" 
                 class="profile-pic rounded-circle">
          } @else {
          <img [src]="'assets/user.png'" 
               alt="Profile Picture" 
               class="profile-pic rounded-circle">
          }
        </div>
        
        <div class="profile-actions">
          <button class="btn btn-outline-success rounded-pill" (click)="goToUpdate()">Edit profile</button>
        </div>
        
        <div class="profile-details mt-4">
          <h2 class="profile-name">{{memberModel.username}}</h2>
          <h2 class="profile-unique-name">&#64;{{memberModel.uniqueNameIdentifier}}</h2>
          <p class="text-muted">Joined {{formatDate(memberModel.joinedAt)}}</p>
          
          <div class="profile-stats d-flex mt-3">
            <div class="me-4">
              <span class="fw-bold">420</span> <span class="text-muted">Following</span>
            </div>
            <div>
              <span class="fw-bold">1.2K</span> <span class="text-muted">Followers</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Tabs Section -->
    <div class="profile-tabs mt-4">
      <app-profile-tabs></app-profile-tabs>
    </div>
  } @else {
    <div class="loading-spinner d-flex justify-content-center align-items-center" style="height: 300px;">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  }
</div>
