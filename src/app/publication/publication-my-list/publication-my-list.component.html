<div class="publication-list-container">

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p>Loading your publications...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="publications.length === 0">
    <i class="bi bi-newspaper"></i>
    <h3>No publications yet</h3>
    <p>When you create publications, they'll appear here.</p>
  </div>

  <!-- Publications List -->
  <div class="publications-list">
    <app-publication-card 
      *ngFor="let publication of publications"
      [publication]="publication"
      (editPublication)="onUpdatePublication($event)"
      (deletePublication)="onDeletePublication($event)"
      (likePublication)="onLikePublication($event)">
    </app-publication-card>
  </div>
</div>
